name: knowflow-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: knowflow-adminer
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

